<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slurp! 2026 — Duration Brewing</title>
<style>
  :root {
    --bg: #0e1710;
    --surface: #141f15;
    --card: #1c2c1e;
    --card2: #222f24;
    --border: #2c3f2e;
    --border2: #384f3a;
    --green: #52c97a;
    --amber: #e8a23a;
    --text: #f0f7f1;
    --sub: #7aaa80;
    --muted: #4a6b4e;
    --tried: #52c97a;
    --cask: #c084fc;
    --wild: #38bdf8;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }

  /* ── HEADER ── */
  .app-header {
    background: linear-gradient(160deg, #0e1710 60%, #1a3020);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px 0;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-top { display: flex; align-items: baseline; gap: 10px; margin-bottom: 4px; }
  .header-title { font-size: 1.45rem; font-weight: 800; color: var(--text); letter-spacing: -0.3px; }
  .header-stats { font-size: 0.72rem; color: var(--sub); white-space: nowrap; }
  .tabs { display: flex; gap: 0; margin-top: 8px; }
  .tab-btn {
    flex: 1;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--sub);
    font-size: 0.82rem;
    font-weight: 600;
    padding: 8px 4px 10px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    white-space: nowrap;
  }
  .tab-btn.active { color: var(--green); border-bottom-color: var(--green); }
  .tab-btn .badge {
    background: var(--green);
    color: #0e1710;
    font-size: 0.65rem;
    font-weight: 800;
    border-radius: 8px;
    padding: 1px 5px;
    min-width: 18px;
    text-align: center;
    display: inline-block;
  }

  /* ── GLOBAL FILTER BAR ── */
  .global-filters {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 6px 0 2px;
  }
  .filter-label {
    font-size: 0.62rem;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 0 12px;
    margin-bottom: 4px;
  }
  .filter-row {
    display: flex;
    gap: 6px;
    padding: 0 12px 6px;
    overflow-x: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .filter-row::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--sub);
    font-size: 0.75rem;
    font-weight: 600;
    padding: 5px 11px;
    cursor: pointer;
    transition: background 0.12s, color 0.12s, border-color 0.12s;
    white-space: nowrap;
    user-select: none;
  }
  .chip.active { background: var(--green); border-color: var(--green); color: #0e1710; }
  .chip.active-diet-vg { background: #6a3de8; border-color: #6a3de8; color: #fff; }
  .chip.active-diet-v  { background: #3a8a3a; border-color: #3a8a3a; color: #fff; }
  .chip.active-diet-gf { background: var(--amber); border-color: var(--amber); color: #0e1710; }
  .chip.active-diet-af { background: #0ea5e9; border-color: #0ea5e9; color: #fff; }
  .chip.active-diet-lf { background: #0ea5e9; border-color: #0ea5e9; color: #fff; }

  /* ── MAIN CONTENT ── */
  .tab-panel { display: none; padding: 12px 0 80px; }
  .tab-panel.active { display: block; }

  /* ── SEARCH + STYLE FILTER ── */
  .search-wrap { padding: 0 12px 8px; }
  .search-input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 0.9rem;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-input:focus { border-color: var(--green); }
  .search-input::placeholder { color: var(--muted); }
  .style-filter-row {
    display: flex;
    gap: 6px;
    padding: 0 12px 8px;
    overflow-x: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .style-filter-row::-webkit-scrollbar { display: none; }

  /* ── TAP LEGEND ── */
  .tap-legend {
    padding: 8px 14px;
    font-size: 0.72rem;
    color: var(--sub);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }
  .tap-legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .legend-dot.green { background: #52c97a; }
  .legend-dot.red   { background: #e05b5b; }

  /* ── SECTION / GROUP HEADERS ── */
  .bar-section-header {
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 9px 14px;
    font-size: 0.85rem;
    font-weight: 800;
    color: var(--text);
    letter-spacing: 0.2px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* ── BEER CARD ── */
  .beer-card {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 11px 14px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    transition: background 0.12s;
  }
  .beer-card:hover { background: var(--card2); }
  .beer-card.on-list  { border-left: 3px solid var(--green); }
  .beer-card.tried-card { border-left: 3px solid var(--tried); opacity: 0.75; }
  .beer-card.keg2-card { background: #1f1a0d; }
  .beer-card.keg2-card:hover { background: #2a2310; }
  .beer-info { flex: 1; min-width: 0; }
  .beer-name { font-size: 0.92rem; font-weight: 700; color: var(--text); line-height: 1.3; }
  .beer-sub { font-size: 0.78rem; color: var(--sub); margin-top: 2px; }
  .beer-sub .abv { color: var(--green); font-weight: 600; }
  .beer-adj { font-size: 0.72rem; color: var(--muted); margin-top: 3px; font-style: italic; }
  .beer-collab { font-size: 0.72rem; color: var(--amber); margin-top: 2px; }
  .pill-price { background: rgba(232,162,58,0.12); color: var(--amber); border-color: rgba(232,162,58,0.3); }
  .badge-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
  .pill {
    font-size: 0.65rem;
    font-weight: 600;
    border-radius: 10px;
    padding: 2px 7px;
    border: 1px solid transparent;
    white-space: nowrap;
  }
  .pill-bar    { border-color: var(--border2); color: var(--muted); }
  .pill-gf     { background: rgba(232,162,58,0.15); color: var(--amber); border-color: rgba(232,162,58,0.3); }
  .pill-af     { background: rgba(232,162,58,0.12); color: var(--amber); border-color: rgba(232,162,58,0.25); }
  .pill-cask   { background: rgba(192,132,252,0.12); color: var(--cask); border-color: rgba(192,132,252,0.25); }
  .pill-wild   { background: rgba(56,189,248,0.12); color: var(--wild); border-color: rgba(56,189,248,0.25); }
  .pill-nolow  { background: rgba(232,162,58,0.10); color: var(--amber); border-color: rgba(232,162,58,0.2); }
  .pill-dark   { background: rgba(180,100,40,0.15); color: #d4956a; border-color: rgba(180,100,40,0.3); }
  .pill-collab { background: rgba(232,162,58,0.10); color: var(--amber); border-color: rgba(232,162,58,0.2); }
  .pill-keg1   { background: rgba(82,201,122,0.10); color: var(--green); border-color: rgba(82,201,122,0.2); }
  .pill-keg2   { background: rgba(232,162,58,0.15); color: var(--amber); border-color: rgba(232,162,58,0.3); }
  .pill-vg     { background: rgba(106,61,232,0.12); color: #a78bfa; border-color: rgba(106,61,232,0.25); }
  .pill-v      { background: rgba(58,138,58,0.12); color: #6fc96f; border-color: rgba(58,138,58,0.25); }

  .add-btn {
    background: var(--green);
    border: none;
    border-radius: 50%;
    width: 32px;
    height: 32px;
    color: #0e1710;
    font-size: 1.2rem;
    font-weight: 700;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    transition: opacity 0.12s, transform 0.1s;
    margin-top: 2px;
  }
  .add-btn:active { transform: scale(0.9); }
  .add-btn.on-list {
    background: var(--card2);
    border: 2px solid var(--green);
    color: var(--green);
    font-size: 0.9rem;
  }

  /* ── WHAT'S ON ── */
  .whats-on-section { margin-bottom: 2px; }
  .section-header {
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 9px 14px;
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .section-note { font-size: 0.72rem; color: var(--muted); font-weight: 400; margin-left: 4px; }
  .wo-item {
    padding: 9px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 0.86rem;
    color: var(--text);
    background: var(--card);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
  }
  .wo-item:last-child { border-bottom: none; }
  .wo-item-left { flex: 1; min-width: 0; }
  .wo-item-name { font-size: 0.86rem; color: var(--text); }
  .wo-item-meta { font-size: 0.65rem; color: var(--muted); margin-top: 2px; display: flex; flex-wrap: wrap; gap: 4px; }
  .wo-price { color: var(--amber); font-weight: 600; font-size: 0.78rem; flex-shrink: 0; text-align: right; padding-top: 1px; }
  .wo-diet-pill {
    font-size: 0.6rem;
    font-weight: 700;
    border-radius: 8px;
    padding: 1px 5px;
    border: 1px solid transparent;
    white-space: nowrap;
  }
  .wo-diet-pill.vg { background: rgba(106,61,232,0.12); color: #a78bfa; border-color: rgba(106,61,232,0.25); }
  .wo-diet-pill.v  { background: rgba(58,138,58,0.12);  color: #6fc96f; border-color: rgba(58,138,58,0.25); }
  .wo-diet-pill.gf { background: rgba(232,162,58,0.15); color: var(--amber); border-color: rgba(232,162,58,0.3); }
  .wo-diet-pill.af { background: rgba(14,165,233,0.12); color: #38bdf8; border-color: rgba(14,165,233,0.25); }
  .wo-diet-pill.lf { background: rgba(14,165,233,0.12); color: #38bdf8; border-color: rgba(14,165,233,0.25); }
  .wo-item-bars { font-size: 0.65rem; color: var(--green); margin-top: 1px; font-weight: 600; letter-spacing: 0.02em; }
  .pill-loc { background: rgba(255,255,255,0.12); color: #fff; border-color: rgba(255,255,255,0.25); font-weight: 700; }
  .bar-avail { font-size: 0.6rem; color: var(--muted); }

  /* ── MY LIST ── */
  .empty-list { text-align: center; padding: 60px 24px; color: var(--muted); }
  .empty-list .empty-icon { font-size: 3rem; margin-bottom: 12px; }
  .empty-list p { font-size: 0.9rem; line-height: 1.5; }
  .list-card { background: var(--card); border-bottom: 1px solid var(--border); padding: 14px; }
  .list-card.tried-card { border-left: 3px solid var(--tried); opacity: 0.8; }
  .list-card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 10px; }
  .list-card-title { flex: 1; min-width: 0; }
  .list-brewery { font-size: 0.7rem; font-weight: 700; color: var(--green); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
  .list-name { font-size: 0.95rem; font-weight: 700; color: var(--text); line-height: 1.3; }
  .list-sub { font-size: 0.78rem; color: var(--sub); margin-top: 2px; }
  .list-sub .abv { color: var(--green); font-weight: 600; }
  .list-actions { display: flex; gap: 7px; align-items: center; flex-shrink: 0; }
  .tried-btn {
    background: none; border: 1px solid var(--green); border-radius: 6px; color: var(--green);
    font-size: 0.72rem; font-weight: 700; padding: 5px 9px; cursor: pointer; white-space: nowrap;
    transition: background 0.12s, color 0.12s;
  }
  .tried-btn:hover { background: rgba(82,201,122,0.1); }
  .tried-btn.active { background: var(--tried); color: #0e1710; border-color: var(--tried); }
  .remove-btn {
    background: none; border: 1px solid var(--border2); border-radius: 6px; color: var(--muted);
    font-size: 0.72rem; font-weight: 700; padding: 5px 9px; cursor: pointer;
    transition: border-color 0.12s, color 0.12s;
  }
  .remove-btn:hover { border-color: #e05b5b; color: #e05b5b; }
  .ratings-wrap { margin-top: 10px; }
  .rating-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
  .rating-label { font-size: 0.7rem; color: var(--sub); width: 72px; flex-shrink: 0; }
  .stars { display: flex; gap: 3px; }
  .star {
    font-size: 1rem; cursor: pointer; color: var(--border2);
    transition: color 0.1s, transform 0.1s; line-height: 1; user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .star:active { transform: scale(1.3); }
  .star.filled { color: var(--amber); }
  .notes-wrap { margin-top: 8px; }
  .notes-textarea {
    width: 100%; background: var(--card2); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-size: 0.82rem; padding: 8px 10px; resize: vertical; min-height: 56px;
    font-family: inherit; outline: none; transition: border-color 0.15s;
  }
  .notes-textarea:focus { border-color: var(--green); }
  .notes-textarea::placeholder { color: var(--muted); }
  .untappd-link {
    display: inline-flex; align-items: center; gap: 5px; margin-top: 8px;
    color: var(--amber); font-size: 0.75rem; font-weight: 600; text-decoration: none;
    opacity: 0.85; transition: opacity 0.12s;
  }
  .untappd-link:hover { opacity: 1; }

  /* ── TOAST ── */
  #toast-container {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    z-index: 9999; display: flex; flex-direction: column; align-items: center; gap: 8px; pointer-events: none;
  }
  .toast {
    background: var(--card2); border: 1px solid var(--border2); border-radius: 20px; color: var(--text);
    font-size: 0.82rem; font-weight: 600; padding: 9px 18px; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    animation: toast-in 0.2s ease, toast-out 0.3s ease 2s forwards; white-space: nowrap;
  }
  .toast.success { border-color: var(--green); color: var(--green); }
  .toast.info    { border-color: var(--amber); color: var(--amber); }
  @keyframes toast-in  { from { opacity:0; transform:translateY(10px) scale(0.95); } to { opacity:1; transform:translateY(0) scale(1); } }
  @keyframes toast-out { from { opacity:1; } to { opacity:0; transform:translateY(-6px); } }

  .no-results { text-align: center; padding: 40px 24px; color: var(--muted); font-size: 0.88rem; }
  @media (max-width: 360px) {
    .header-title { font-size: 1.2rem; }
    .tab-btn { font-size: 0.74rem; }
  }
  /* ── PASSWORD GATE ── */
</style>
</head>
<body>


<header class="app-header">
  <div class="header-top">
    <span class="header-title">🌿 Slurp! 2026</span>
    <span class="header-stats" id="header-stats"></span>
  </div>
  <div class="tabs">
    <button class="tab-btn active" data-tab="beers">BEER + CIDER</button>
    <button class="tab-btn" data-tab="whatson">OTHER DRINKS</button>
    <button class="tab-btn" data-tab="merch">MERCH + SNACKS</button>
    <button class="tab-btn" data-tab="mylist">My List <span class="badge" id="list-badge" style="display:none">0</span></button>
  </div>
</header>

<!-- ═══ GLOBAL FILTERS (sticky, affects all tabs) ═══ -->
<div class="global-filters" id="global-filters" style="position:sticky;top:var(--header-h,89px);z-index:99;">
  <div class="filter-label">Bar</div>
  <div class="filter-row" id="bar-filters"></div>
  <div class="filter-label">Style</div>
  <div class="filter-row" id="style-filters"></div>
  <div class="filter-label">Dietary</div>
  <div class="filter-row" id="diet-filters"></div>
  <div class="search-wrap" style="padding-top:4px">
    <input type="search" class="search-input" id="search-input" placeholder="Search beers, breweries, styles, tap #…" autocomplete="off" autocorrect="off" spellcheck="false">
  </div>
</div>

<div id="toast-container"></div>

<!-- ═══════════════ TAB: BEERS ═══════════════ -->
<div class="tab-panel active" id="panel-beers">
  <div id="beer-list"></div>
</div>

<!-- ═══════════════ TAB: WHAT'S ON ═══════════════ -->
<div class="tab-panel" id="panel-whatson">
  <div id="whatson-content"></div>
</div>

<!-- ═══════════════ TAB: SNACKS + MERCH ═══════════════ -->
<div class="tab-panel" id="panel-snacks-merch">
  <div id="merch-content"></div>
</div>

<!-- ═══════════════ TAB: MY LIST ═══════════════ -->
<div class="tab-panel" id="panel-mylist">
  <div id="mylist-content"></div>
</div>

<script>

// ═══════════════════════════════════════════════════════
// BEER DATA
// diet: ['vg']=vegan, ['v']=vegetarian (not vegan), ['gf']=gluten free

function cat(style, tags) {
  const s = style.toLowerCase();
  if (/\bipa\b|india pale|double ipa|ddh ipa|cold ipa/.test(s)) return 'ipa';
  if (tags.includes('sour') || /sour|berliner|gose/.test(s)) return 'sour';
  if (/pale|xpa|table pale|hopped pale|grisette|weisse/.test(s)) return 'pale';
  if (/stout|porter|dark ale|mild/.test(s)) return 'dark';
  if (/lager|pils|pilsner|radler|helles/.test(s)) return 'lager';
  if (tags.includes('wild') || /foeder|wild|saison|barrel/.test(s)) return 'wild';
  if (tags.includes('cask')) return 'cask';
  if (tags.includes('nolow') || tags.includes('af')) return 'nolow';
  return '';
}

// Returns base category for combined chips
function catForFilter(beer) {
  return cat(beer.s, beer.t);
}

function dietMatch(itemDiet, activeDiet) {
  if (!activeDiet) return true;
  if (activeDiet === 'vg') return itemDiet.includes('vg');
  if (activeDiet === 'v')  return itemDiet.includes('vg') || itemDiet.includes('v');
  if (activeDiet === 'gf') return itemDiet.includes('gf');
  if (activeDiet === 'af') return itemDiet.includes('af');
  if (activeDiet === 'lf') return itemDiet.includes('lf');
  return true;
}

function beerPassesFilters(beer) {
  if (activeBar !== '' && beer.bar !== activeBar) return false;
  if (activeDiet === 'gf' && !beer.t.includes('gf')) return false;
  if (activeDiet === 'af' && !beer.t.includes('af') && !beer.t.includes('nolow') && beer.abv > 1.0) return false;
  if (activeDiet === 'vg' && !beer.diet.includes('vg')) return false;
  if (activeDiet === 'v'  && !beer.diet.includes('vg') && !beer.diet.includes('v')) return false;
  if (activeDiet === 'lf' && !beer.diet.includes('lf')) return false;
  if (activeStyle !== '') {
    if (activeStyle === 'nolow') {
      if (!(beer.abv <= 1.0) && !beer.t.includes('nolow') && !beer.t.includes('af')) return false;
    } else if (activeStyle === 'pale-ipa') {
      const c = cat(beer.s, beer.t);
      if (c !== 'pale' && c !== 'ipa') return false;
    } else if (activeStyle === 'wild-sour') {
      const c = cat(beer.s, beer.t);
      if (c !== 'wild' && c !== 'sour' && !beer.t.includes('wild') && !beer.t.includes('sour')) return false;
    } else if (activeStyle === 'cask') {
      if (!beer.t.includes('cask')) return false;
    } else {
      const c = cat(beer.s, beer.t);
      if (c !== activeStyle) return false;
    }
  }
  if (searchQ) {
    const q = searchQ.toLowerCase();
    const hay = [beer.n, beer.b, beer.s, beer.adj||'', beer.co||'', String(beer.tap)].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function onList(id)   { return !!state.list[id]; }
function isTried(id)  { return state.list[id] && state.list[id].tried; }
function listCount()  { return Object.keys(state.list).length; }
function triedCount() { return Object.values(state.list).filter(v => v.tried).length; }

function addToList(id) {
  if (state.list[id]) return;
  state.list[id] = { tried: false, ratings: {}, notes: '' };
  saveState();
}
function removeFromList(id) { delete state.list[id]; saveState(); }
function toggleTried(id) {
  if (!state.list[id]) return;
  state.list[id].tried = !state.list[id].tried;
  saveState();
}
function setRating(id, axis, val) {
  if (!state.list[id]) return;
  if (!state.list[id].ratings) state.list[id].ratings = {};
  state.list[id].ratings[axis] = val;
  saveState();
}
function setNotes(id, text) {
  if (!state.list[id]) return;
  state.list[id].notes = text;
  saveState();
}

function renderBeerList() {
  const container = document.getElementById('beer-list');
  container.innerHTML = '';

  const filtered = BEERS.filter(beerPassesFilters);
  if (filtered.length === 0) {
    const el = document.createElement('div');
    el.className = 'no-results';
    const barsWithTaps = ['Boom Bar', 'Farmers Bar', 'Horsebox', 'Taproom Bar'];
    el.textContent = activeBar && !barsWithTaps.includes(activeBar)
      ? `No tap beers at ${activeBar} — check the Other Drinks tab.`
      : 'No beers match your filters.';
    container.appendChild(el);
    return;
  }

  const barMap = new Map();
  filtered.forEach(beer => {
    if (!barMap.has(beer.bar)) barMap.set(beer.bar, new Map());
    const tapMap = barMap.get(beer.bar);
    if (!tapMap.has(beer.tap)) tapMap.set(beer.tap, []);
    tapMap.get(beer.tap).push(beer);
  });

  BAR_ORDER.forEach(barName => {
    if (!barMap.has(barName)) return;
    const tapMap = barMap.get(barName);

    if (activeBar === '') {
      const barHdr = document.createElement('div');
      barHdr.className = 'bar-section-header';
      barHdr.textContent = barName;
      container.appendChild(barHdr);
    }

    [...tapMap.keys()].sort((a, b) => a - b).forEach(tapNum => {
      const tapBeers = tapMap.get(tapNum).sort((a, b) => (a.keg||1) - (b.keg||1));
      const group = document.createElement('div');
      tapBeers.forEach(beer => makeBeerCard(beer, group));
      container.appendChild(group);
    });
  });

  // Append Beer Cans + AF sections below tap beers
  const showBeercans = activeBar === '' || activeBar === 'Taproom Bar' || activeBar === 'Horsebox';
  const showAF = activeBar === '' || ['Farmers Bar','Taproom Bar','Horsebox'].includes(activeBar);

  ['beercans', 'af'].forEach(secId => {
    const show = secId === 'beercans' ? showBeercans : showAF;
    if (!show) return;
    const sec = SECTIONS.find(s => s.id === secId);
    if (!sec) return;

    let items = sec.items;
    if (searchQ) {
      const q = searchQ.toLowerCase();
      items = items.filter(item => item.n.toLowerCase().includes(q));
    }
    if (items.length === 0) return;

    const secHdr = document.createElement('div');
    secHdr.className = 'bar-section-header';
    secHdr.textContent = sec.title;
    container.appendChild(secHdr);

    items.forEach(item => {
      const row = document.createElement('div');
      row.className = 'wo-item';
      const left = document.createElement('div');
      left.className = 'wo-item-left';
      const nameEl = document.createElement('div');
      nameEl.className = 'wo-item-name';
      nameEl.textContent = (item.award ? '🏆 ' : '') + item.n;
      left.appendChild(nameEl);
      if (item.adj) {
        const adjEl = document.createElement('div');
        adjEl.className = 'wo-item-meta';
        adjEl.style.fontStyle = 'italic';
        adjEl.textContent = item.adj;
        left.appendChild(adjEl);
      }
      if (item.bars && item.bars.length > 0) {
        const barsEl = document.createElement('div');
        barsEl.className = 'wo-item-bars';
        barsEl.textContent = item.bars.map(barAbbr).join(' · ');
        left.appendChild(barsEl);
      }
      if (item.diet && item.diet.length > 0 || item.note || item.co) {
        const meta = document.createElement('div');
        meta.className = 'wo-item-meta';
        if (item.diet) {
          item.diet.forEach(d => {
            if (d === 'af') return;
            const pill = document.createElement('span');
            pill.className = `wo-diet-pill ${d}`;
            pill.textContent = d === 'vg' ? 'Vegan' : d === 'v' ? 'Veggie' : d === 'gf' ? 'GF' : 'LF';
            meta.appendChild(pill);
          });
        }
        if (item.co) {
          const coSpan = document.createElement('span');
          coSpan.style.cssText = 'font-size:0.7rem;color:var(--amber);margin-left:2px';
          coSpan.textContent = 'w/ ' + item.co;
          meta.appendChild(coSpan);
        }
        if (item.note) {
          const note = document.createElement('span');
          note.className = 'bar-avail';
          note.textContent = item.note;
          meta.appendChild(note);
        }
        left.appendChild(meta);
      }
      row.appendChild(left);
      if (item.p) {
        const priceEl = document.createElement('div');
        priceEl.className = 'wo-price';
        priceEl.textContent = item.p;
        row.appendChild(priceEl);
      }
      container.appendChild(row);
    });
  });
}

// ═══════════════════════════════════════════════════════
// WHAT'S ON TAB
// ═══════════════════════════════════════════════════════

function renderSnacksMerch() {
  const container = document.getElementById('merch-content');
  if (!container) return;
  container.innerHTML = '';

  ['merch', 'snacks'].forEach(secId => {
    const sec = SECTIONS.find(s => s.id === secId);
    if (!sec) return;

    // Apply dietary filter to snacks (food section)
    let items = sec.items;
    if (sec.food && activeDiet) {
      items = items.filter(item => !item.diet || dietMatch(item.diet, activeDiet));
    }

    const wrap = document.createElement('div');
    wrap.className = 'whats-on-section';
    const hdr = document.createElement('div');
    hdr.className = 'section-header';
    hdr.innerHTML = `<span>${sec.icon}</span><span>${escHtml(sec.title)}</span>`;
    wrap.appendChild(hdr);

    items.forEach(item => {
      const row = document.createElement('div');
      row.className = 'wo-item';
      const left = document.createElement('div');
      left.className = 'wo-item-left';
      const nameEl = document.createElement('div');
      nameEl.className = 'wo-item-name';
      nameEl.textContent = (item.award ? '🏆 ' : '') + item.n;
      left.appendChild(nameEl);

      if (item.bars && item.bars.length > 0) {
        const barsEl = document.createElement('div');
        barsEl.className = 'wo-item-bars';
        barsEl.textContent = item.bars.map(barAbbr).join(' · ');
        left.appendChild(barsEl);
      }

      // Diet pills + note
      if ((item.diet && item.diet.length > 0) || item.note) {
        const meta = document.createElement('div');
        meta.className = 'wo-item-meta';
        if (item.diet) {
          item.diet.forEach(d => {
            if (d === 'af' || d === 'lf') return;
            const pill = document.createElement('span');
            pill.className = `wo-diet-pill ${d}`;
            pill.textContent = d === 'vg' ? 'Vegan' : d === 'v' ? 'Veggie' : 'GF';
            meta.appendChild(pill);
          });
        }
        if (item.note) {
          const note = document.createElement('span');
          note.className = 'bar-avail';
          note.textContent = item.note;
          meta.appendChild(note);
        }
        left.appendChild(meta);
      }

      row.appendChild(left);
      if (item.p) {
        const priceEl = document.createElement('div');
        priceEl.className = 'wo-price';
        priceEl.textContent = item.p;
        row.appendChild(priceEl);
      }
      wrap.appendChild(row);
    });
    container.appendChild(wrap);
  });
}

function renderWhatsOn() {
  const container = document.getElementById('whatson-content');
  container.innerHTML = '';
  let anyShown = false;

  SECTIONS.forEach(sec => {
    // Merch + Snacks rendered in their own tab
    if (sec.id === 'merch' || sec.id === 'snacks') return;
    // Bar filter
    if (activeBar !== '' && !sec.bars.includes(activeBar)) return;

    // For food sections, filter items by dietary preference and search
    let items = sec.items;
    if (sec.food && activeDiet) {
      items = items.filter(item => !item.diet || dietMatch(item.diet, activeDiet));
    }
    if (searchQ) {
      const q = searchQ.toLowerCase();
      items = items.filter(item => item.n.toLowerCase().includes(q));
    }
    if (items.length === 0) return;

    anyShown = true;
    const wrap = document.createElement('div');
    wrap.className = 'whats-on-section';

    const hdr = document.createElement('div');
    hdr.className = 'section-header';
    let noteHtml = '';
    if (sec.note) noteHtml = `<span class="section-note">— ${escHtml(sec.note)}</span>`;

    // Show which bars carry this section when All Bars is active
    let barHtml = '';
    if (activeBar === '' && sec.bars.length < 4) {
      barHtml = `<span class="section-note" style="margin-left:auto;font-size:0.6rem;">${sec.bars.join(', ')}</span>`;
    }
    hdr.innerHTML = `<span>${sec.icon}</span><span>${escHtml(sec.title)}${noteHtml}</span>${barHtml}`;
    wrap.appendChild(hdr);

    items.forEach(item => {
      const row = document.createElement('div');
      row.className = 'wo-item';

      const left = document.createElement('div');
      left.className = 'wo-item-left';

      const nameEl = document.createElement('div');
      nameEl.className = 'wo-item-name';
      nameEl.textContent = (item.award ? '🏆 ' : '') + item.n;
      left.appendChild(nameEl);

      if (item.co) {
        const coEl = document.createElement('div');
        coEl.style.cssText = 'font-size:0.72rem;color:var(--amber);margin-top:1px';
        coEl.textContent = 'w/ ' + item.co;
        left.appendChild(coEl);
      }

      if (item.bars && item.bars.length > 0) {
        const barsEl = document.createElement('div');
        barsEl.className = 'wo-item-bars';
        barsEl.textContent = item.bars.map(barAbbr).join(' · ');
        left.appendChild(barsEl);
      }

      // Flavour subtitle for items with adj
      if (item.adj) {
        const adjEl = document.createElement('div');
        adjEl.className = 'wo-item-meta';
        adjEl.style.fontStyle = 'italic';
        adjEl.textContent = item.adj;
        left.appendChild(adjEl);
      }

      // Diet pills + note
      if (item.diet && item.diet.length > 0 || item.note) {
        const meta = document.createElement('div');
        meta.className = 'wo-item-meta';
        if (item.diet) {
          item.diet.forEach(d => {
            if (d === 'af') return;
            const pill = document.createElement('span');
            pill.className = `wo-diet-pill ${d}`;
            pill.textContent = d === 'vg' ? 'Vegan' : d === 'v' ? 'Veggie' : d === 'lf' ? 'LF' : 'GF';
            meta.appendChild(pill);
          });
        }
        if (item.note) {
          const note = document.createElement('span');
          note.className = 'bar-avail';
          note.textContent = item.note;
          meta.appendChild(note);
        }
        left.appendChild(meta);
      }
      row.appendChild(left);

      if (item.p) {
        const priceEl = document.createElement('div');
        priceEl.className = 'wo-price';
        priceEl.textContent = item.p;
        row.appendChild(priceEl);
      }
      wrap.appendChild(row);
    });

    container.appendChild(wrap);
  });

  if (!anyShown) {
    const el = document.createElement('div');
    el.className = 'no-results';
    el.textContent = 'Nothing matches your current filters.';
    container.appendChild(el);
  }
}

// ═══════════════════════════════════════════════════════
// MY LIST TAB
// ═══════════════════════════════════════════════════════

function renderMyList() {
  const container = document.getElementById('mylist-content');
  container.innerHTML = '';

  const listIds  = Object.keys(state.list).map(Number);
  const listBeers = BEERS.filter(b => listIds.includes(b.id));

  if (listBeers.length === 0) {
    container.innerHTML = `<div class="empty-list"><div class="empty-icon">🌿</div><p>Your list is empty.<br>Head to <strong>Beers</strong> and tap <strong>+</strong> to start adding.</p></div>`;
    return;
  }

  const groups = new Map();
  listBeers.forEach(beer => {
    const key = beer.bar + ' — ' + beer.b;
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(beer);
  });

  groups.forEach((beers, key) => {
    const groupWrap = document.createElement('div');
    const hdr = document.createElement('div');
    hdr.className = 'bar-section-header';
    hdr.style.fontSize = '0.72rem';
    hdr.textContent = key;
    groupWrap.appendChild(hdr);

    beers.forEach(beer => {
      const data = state.list[beer.id] || {};
      const tried = data.tried || false;
      const card = document.createElement('div');
      card.className = 'list-card' + (tried ? ' tried-card' : '');

      const cardHdr = document.createElement('div');
      cardHdr.className = 'list-card-header';

      const titleWrap = document.createElement('div');
      titleWrap.className = 'list-card-title';
      titleWrap.innerHTML = `
        <div class="list-brewery">${escHtml(beer.b)} · Tap #${beer.tap} · ${escHtml(beer.bar)}</div>
        <div class="list-name">${escHtml(beer.n)}</div>
        <div class="list-sub">${escHtml(beer.s)} · <span class="abv">${beer.abv.toFixed(1)}%</span></div>
      `;
      cardHdr.appendChild(titleWrap);

      const actions = document.createElement('div');
      actions.className = 'list-actions';

      const triedBtn = document.createElement('button');
      triedBtn.className = 'tried-btn' + (tried ? ' active' : '');
      triedBtn.textContent = tried ? '✓ Tried' : 'Mark Tried';
      triedBtn.addEventListener('click', () => {
        toggleTried(beer.id);
        if (state.list[beer.id].tried) toast('Marked as tried: ' + beer.n);
        updateStats(); renderBeerList(); renderMyList();
      });
      actions.appendChild(triedBtn);

      const removeBtn = document.createElement('button');
      removeBtn.className = 'remove-btn';
      removeBtn.textContent = 'Remove';
      removeBtn.addEventListener('click', () => {
        removeFromList(beer.id);
        toast('Removed: ' + beer.n, 'info');
        updateStats(); renderBeerList(); renderMyList();
      });
      actions.appendChild(removeBtn);
      cardHdr.appendChild(actions);
      card.appendChild(cardHdr);

      // Star ratings
      const ratingsWrap = document.createElement('div');
      ratingsWrap.className = 'ratings-wrap';
      RATING_AXES.forEach(axis => {
        const row = document.createElement('div');
        row.className = 'rating-row';
        const lbl = document.createElement('div');
        lbl.className = 'rating-label';
        lbl.textContent = axis;
        row.appendChild(lbl);
        const stars = document.createElement('div');
        stars.className = 'stars';
        const currentVal = (data.ratings && data.ratings[axis]) || 0;
        for (let i = 1; i <= 5; i++) {
          const star = document.createElement('span');
          star.className = 'star' + (i <= currentVal ? ' filled' : '');
          star.textContent = '★';
          star.addEventListener('click', () => {
            const prev = (state.list[beer.id].ratings && state.list[beer.id].ratings[axis]) || 0;
            setRating(beer.id, axis, i === prev ? 0 : i);
            renderMyList();
          });
          star.addEventListener('mouseover', () => {
            stars.querySelectorAll('.star').forEach((s, idx) => { s.style.color = idx < i ? 'var(--amber)' : ''; });
          });
          star.addEventListener('mouseout', () => {
            const cv = (state.list[beer.id] && state.list[beer.id].ratings && state.list[beer.id].ratings[axis]) || 0;
            stars.querySelectorAll('.star').forEach((s, idx) => { s.style.color = idx < cv ? 'var(--amber)' : ''; });
          });
          stars.appendChild(star);
        }
        row.appendChild(stars);
        ratingsWrap.appendChild(row);
      });
      card.appendChild(ratingsWrap);

      const notesWrap = document.createElement('div');
      notesWrap.className = 'notes-wrap';
      const textarea = document.createElement('textarea');
      textarea.className = 'notes-textarea';
      textarea.placeholder = 'Tasting notes…';
      textarea.value = data.notes || '';
      textarea.addEventListener('input', (e) => setNotes(beer.id, e.target.value));
      notesWrap.appendChild(textarea);

      const link = document.createElement('a');
      link.className = 'untappd-link';
      link.href = 'https://untappd.com/search?q=' + encodeURIComponent(beer.b + ' ' + beer.n);
      link.target = '_blank';
      link.rel = 'noopener noreferrer';
      link.innerHTML = '<span>🍺</span> Search Untappd';
      notesWrap.appendChild(link);
      card.appendChild(notesWrap);
      groupWrap.appendChild(card);
    });
    container.appendChild(groupWrap);
  });
}

// ═══════════════════════════════════════════════════════
// TAB SWITCHING
// ═══════════════════════════════════════════════════════

function switchTab(tabName) {
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tabName));
  // Map tab keys to panel ids
  const panelId = tabName === 'merch' ? 'panel-snacks-merch' : `panel-${tabName}`;
  document.querySelectorAll('.tab-panel').forEach(panel => panel.classList.toggle('active', panel.id === panelId));
  if (tabName === 'mylist') renderMyList();
  if (tabName === 'merch') renderSnacksMerch();
}
document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => switchTab(btn.dataset.tab)));
document.getElementById('search-input').addEventListener('input', (e) => { searchQ = e.target.value.trim(); renderBeerList(); renderWhatsOn(); });

// Set the CSS custom property for global filter bar height offset
function setHeaderOffset() {
  const h = document.querySelector('.app-header').offsetHeight;
  document.getElementById('global-filters').style.top = h + 'px';
}
window.addEventListener('resize', setHeaderOffset);
setHeaderOffset();

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════

buildBarChips();
buildDietChips();
buildStyleChips();
renderBeerList();
renderWhatsOn();
updateStats();
</script>
</body>
